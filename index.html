<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABSENSI SATRIA JOYOKUSUMO</title>
<link rel="icon" href="JOYOKUSUMO.png">

<style>
    :root{
    --dark:#0a120a;
    --panel:#132213;
    --primary:#556b2f;
    --accent:#8aa64a;
    --text:#eaf5ea;
    --danger:#ff3b3b;
    --success:#4CAF50;
    }
    
    /* RESET */
    *{
    box-sizing:border-box;
    margin:0;
    padding:0;
    }
    
    body{
    font-family:Segoe UI, Arial;
    color:var(--text);
    background:
    radial-gradient(circle at 20% 30%, #3c4f2c 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, #4a6035 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, #2a3a1f 0%, transparent 40%),
    var(--dark);
    min-height:100vh;
    }
    
    /* NOTIFICATION */
    .notification{
    position:fixed;
    top:-120px;
    left:50%;
    transform:translateX(-50%);
    padding:16px 26px;
    border-radius:14px;
    box-shadow:0 20px 50px rgba(0,0,0,0.7);
    font-weight:600;
    transition:0.4s ease;
    z-index:9999;
    display:flex;
    align-items:center;
    gap:12px;
    min-width:260px;
    justify-content:center;
    backdrop-filter:blur(6px);
    }
    
    .notification.show{
    top:25px;
    }
    
    .notification.success{
    background:linear-gradient(145deg,#1b3a1b,#244f24);
    border-left:6px solid var(--success);
    }
    
    .notification.error{
    background:linear-gradient(145deg,#3b1b1b,#5a2222);
    border-left:6px solid var(--danger);
    }
    
    /* LOGIN */
    .login{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    }
    
    .login-box{
    background:rgba(10,20,10,0.96);
    padding:45px;
    border-radius:20px;
    width:360px;
    box-shadow:0 30px 70px rgba(0,0,0,0.8);
    animation:fade 0.5s ease;
    }
    
    .login-logo{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    }
    
    .logo-img{
    height:70px;
    object-fit:contain;
    }
    
    .login-box h2{
    text-align:center;
    margin-bottom:20px;
    letter-spacing:1px;
    }
    
    input,select{
    width:100%;
    padding:13px;
    margin-top:12px;
    border-radius:10px;
    border:none;
    background:#1c2e1c;
    color:white;
    font-size:14px;
    transition:0.2s;
    }
    
    input:focus,select:focus{
    outline:none;
    background:#233b23;
    }
    
    .password-box{
    position:relative;
    }
    
    .eye{
    position:absolute;
    right:15px;
    top:14px;
    cursor:pointer;
    font-size:18px;
    }
    
    /* BUTTON */
    button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(145deg,#556b2f,#6f8f3f);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.25s;
    }
    
    button:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 15px rgba(0,0,0,0.5);
    }
    
    /* APP */
    #app{
    display:none;
    }
    
    /* SIDEBAR */
    .sidebar{
    position:fixed;
    width:260px;
    height:100vh;
    background:rgba(10,20,10,0.95);
    backdrop-filter:blur(8px);
    box-shadow:5px 0 30px rgba(0,0,0,0.6);
    padding-top:10px;
    }
    
    .logo{
    text-align:center;
    padding:20px;
    font-size:20px;
    font-weight:bold;
    border-bottom:1px solid #2b3b2b;
    letter-spacing:1px;
    }
    
    .menu{
    padding:16px 25px;
    cursor:pointer;
    transition:0.2s;
    border-bottom:1px solid #1f2f1f;
    }
    
    .menu:hover{
    background:var(--primary);
    padding-left:30px;
    }
    
    /* CONTENT */
    .content{
    margin-left:260px;
    min-height:100vh;
    padding:40px;
    }
    
    /* SECTION */
    .section{
    display:none;
    max-width:1100px;
    margin:auto;
    animation:fade 0.4s ease;
    }
    
    .section.active{
    display:block;
    }
    
    /* HEADER */
    .header{
    font-size:28px;
    margin-bottom:25px;
    font-weight:bold;
    text-align:center;
    letter-spacing:1px;
    }
    
    /* CARDS */
    .cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:20px;
    margin-top:20px;
    }
    
    .card{
    background:rgba(20,35,20,0.9);
    padding:25px;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    transition:0.25s;
    }
    
    .card:hover{
    transform:translateY(-6px);
    }
    
    .card span{
    font-size:30px;
    font-weight:bold;
    display:block;
    margin-top:10px;
    color:#9fff9f;
    }
    
    /* FORM */
    .form-box{
    background:rgba(20,35,20,0.9);
    padding:30px;
    border-radius:16px;
    max-width:520px;
    margin:auto;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
    }
    
    /* TABLE */
    table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:rgba(20,35,20,0.9);
    border-radius:14px;
    overflow:hidden;
    }
    
    th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #2d3d2d;
    }
    
    th{
    background:var(--primary);
    }
    
    tr:hover{
    background:#1c2c1c;
    }
    
    /* JAM REAL TIME */
    .time-input{
    position:relative;
    margin-top:10px;
    }
    
    #jamA{
    background:linear-gradient(145deg,#1c2e1c,#233b23);
    padding-right:55px;
    font-family:Courier New;
    text-align:center;
    font-weight:bold;
    letter-spacing:1px;
    color:#90EE90;
    }
    
    .refresh-time{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    width:35px;
    height:35px;
    border-radius:50%;
    background:var(--primary);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    border:none;
    }
    
    .refresh-time:hover{
    background:var(--accent);
    }
    
    /* ANIMATION */
    @keyframes fade{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
    }
    textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1c2e1c;
color:white;
resize:none;
height:80px;
font-family:Segoe UI;
}
    </style>
</head>
<body>

<div class="notification" id="notif"></div>

<!-- LOGIN -->
<div class="login" id="loginPage">
    <div class="login-box">
      
      <!-- Logo TNI & Diponegoro & satria joyokusumo -->
      <div class="login-logo">
        <img src="DIPO.png" alt="Diponegoro" class="logo-img">
        <img src="imgbin_062b1dcf7da859f8cc2d75c6652cd5fe.png" alt="eka paksi" class="logo-img">
        <img src="JOYOKUSUMO.png" alt="satria joyokusumo" class="logo-img">
      </div>
  
      <h2>SATRIA JOYOKUSUMO</h2>
      
      <input id="idLogin" placeholder="ID Login">
      <div class="password-box">
        <input type="password" id="passLogin" placeholder="Password">
        <span class="eye" onclick="togglePass()">👁</span>
      </div>
      <button onclick="login()">Masuk</button>
    </div>
  </div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="logo">YONIF TP 936 / SATRIA JOYOKUSUMO</div>
    <div class="menu adminOnly" onclick="show('dashboard')">Dashboard</div>
    <div class="menu" onclick="show('absen')">Absen</div>
    <div class="menu" onclick="show('izin')">Perizinan</div>
    <div class="menu adminOnly" onclick="show('laporan')">Laporan</div>
    <div class="menu" onclick="logout()">Logout</div>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">
      <div class="header">Dashboard</div>
      <div class="cards">
        <div class="card">Hadir<span id="hadir"></span></div>
        <div class="card">Terlambat<span id="telat"></span></div>
        <div class="card">Izin<span id="izinTotal"></span></div>
        <div class="card">Total Data<span id="total"></span></div>
      </div>
    </div>

    <!-- ABSEN FORM - JAM REAL TIME -->
<div id="absen" class="section">
    <div class="header">Form Absen</div>
    <div class="form-box">
      <input id="namaA" placeholder="Nama Lengkap">
      <input id="pangkatA" placeholder="Pangkat">
      <select id="kompiA" placeholder="Pilih Kompi">
        <option value="">Pilih Kompi</option>
        <option>Kompi Markas</option>
        <option>Kompi Senapan A</option>
        <option>Kompi Senapan B</option>
        <option>Kompi Senapan C</option>
        <option>Kompi Bantuan</option>
        <option>Kompi Pertanian</option>
        <option>Kompi Peternakan</option>
        <option>Kompi Konstruksi</option>
        <option>Kompi Medis</option>
      </select>
      <input id="nrpA" placeholder="NRP">
      
      <!-- JAM REAL TIME -->
      <div class="time-input">
        <input type="text" id="jamA" readonly placeholder="Jam akan terisi otomatis">
        <button type="button" class="refresh-time" onclick="updateJamSekarang()">
          🔄
        </button>
        <small>Otomatis jam sekarang</small>
      </div>
      
      <button onclick="simpanAbsen()">📋 Kirim Absen</button>
    </div>
  </div>
    <!-- PERIZINAN -->
    <div id="izin" class="section">
      <div class="header">Perizinan</div>
      <div class="form-box">
        <input id="namaI" placeholder="Nama">
        <input id="pangkatI" placeholder="Pangkat">
        <select id="kompiI" placeholder="Pilih Kompi">
          <option>Kompi Markas</option>
          <option>Kompi Senapan A</option>
          <option>Kompi Senapan B</option>
          <option>Kompi Bantuan</option>
        <option>Kompi Pertanian</option>
        <option>Kompi Peternakan</option>
        <option>Kompi Konstruksi</option>
        <option>Kompi Medis</option>
        </select>
        <select id="jenisI"placeholder=>
          <option>Sakit</option>
          <option>Cuti</option>
          <option>Dinas Luar</option>
          <option>Izin Lain</option>
        </select>
        <textarea id="ketI" placeholder="Keterangan (contoh: Berobat ke RS / Keperluan keluarga)"></textarea>

        <button onclick="simpanIzin()">Kirim Izin</button>
      </div>
    </div>

    <!-- LAPORAN -->
    <div id="laporan" class="section">
      <div class="header">Laporan Absensi</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:15px;">
        <button onclick="setFilter('all')">Semua</button>
        <button onclick="setFilter('Hadir')">Hadir</button>
        <button onclick="setFilter('Terlambat')">Terlambat</button>
        <button onclick="setFilter('Izin')">Izin</button>
        <button class="btn-small btn-download" onclick="download()">⬇️</button>
        <button class="btn-small btn-delete" onclick="hapusLaporan()">🗑️</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Pangkat</th>
            <th>Kompi</th>
            <th>NRP</th>
            <th>Status</th>
            <th>Jam</th>
            <th>Keterangan</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
let role = "prajurit"
let data = JSON.parse(localStorage.getItem("absenData") || "[]")
let filter = "all"

/* LOGIN */
function login(){

  const user = document.getElementById("idLogin").value.trim()
  const pass = document.getElementById("passLogin").value.trim()

  if(user === "" || pass === ""){
    notify("ID dan password harus diisi","error")
    return
  }

  if(user === "admin" && pass === "admin123"){
    role = "admin"
  }
  else if(pass === "prajurit"){
    role = "prajurit"
  }
  else{
    notify("Login gagal","error")
    return
  }

  document.getElementById("loginPage").style.display = "none"
  document.getElementById("app").style.display = "block"

  if(role === "prajurit"){
    document.querySelectorAll(".adminOnly").forEach(el=>{
      el.style.display = "none"
    })
  }

  if(role === "prajurit"){
  show("absen")
}
  startClock()
  render()

  notify("Login berhasil")
}

/* SHOW SECTION */
function show(id){
  if(role === "prajurit" && (id === "dashboard" || id === "laporan")){
    notify("Akses ditolak","error")
    return
  }

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active")
  })
  document.getElementById(id).classList.add("active")
}

/* LOGOUT */
function logout(){
  location.reload()
}

/* PASSWORD TOGGLE */
function togglePass(){
  const input = document.getElementById("passLogin")
  input.type = input.type === "password" ? "text" : "password"
}

/* JAM REALTIME */
function startClock(){
  updateJamSekarang()
  setInterval(updateJamSekarang,1000)
}

function updateJamSekarang(){
  const now = new Date()
  const h = String(now.getHours()).padStart(2,"0")
  const m = String(now.getMinutes()).padStart(2,"0")
  const s = String(now.getSeconds()).padStart(2,"0")

  const jam = `${h}:${m}:${s}`

  const jamInput = document.getElementById("jamA")
  if(jamInput) jamInput.value = jam
}

/* SAVE */
function save(){
  localStorage.setItem("absenData", JSON.stringify(data))
  render()
}

/* ABSEN */
function simpanAbsen(){

  const nama = document.getElementById("namaA").value
  const pangkat = document.getElementById("pangkatA").value
  const kompi = document.getElementById("kompiA").value
  const nrp = document.getElementById("nrpA").value
  const jam = document.getElementById("jamA").value

  if(!nama || !pangkat || !kompi){
    notify("Form absen belum lengkap","error")
    return
  }

  const now = new Date()
  const status = now.getHours() >= 8 ? "Terlambat" : "Hadir"

  data.push({
    nama,
    pangkat,
    kompi,
    nrp: nrp || "-",
    status,
    jam,
    keterangan:"-"
  })

  save()

  notify("Absen berhasil")

  document.getElementById("namaA").value=""
  document.getElementById("pangkatA").value=""
  document.getElementById("kompiA").value=""
  document.getElementById("nrpA").value=""
}

/* IZIN */
function simpanIzin(){

  const nama = document.getElementById("namaI").value
  const pangkat = document.getElementById("pangkatI").value
  const kompi = document.getElementById("kompiI").value
  const jenis = document.getElementById("jenisI").value
  const ket = document.getElementById("ketI").value

  if(!nama || !pangkat){
    notify("Form izin belum lengkap","error")
    return
  }

  data.push({
    nama,
    pangkat,
    kompi,
    nrp:"-",
    status:jenis,
    jam:"-",
    keterangan:ket || "-"
  })

  save()

  notify("Izin berhasil")

  document.getElementById("namaI").value=""
  document.getElementById("pangkatI").value=""
  document.getElementById("ketI").value=""
}

/* FILTER */
function setFilter(f){
  filter = f
  render()
}

/* RENDER */
function render(){

  const table = document.getElementById("table")
  table.innerHTML = ""

  let hadir = 0
  let telat = 0
  let izin = 0

  data.forEach((d,i)=>{

    if(d.status === "Hadir") hadir++
    else if(d.status === "Terlambat") telat++
    else izin++

    let show = true

    if(filter === "Hadir" && d.status !== "Hadir") show = false
    if(filter === "Terlambat" && d.status !== "Terlambat") show = false

    if(filter === "Izin"){
      const izinList = ["Sakit","Cuti","Dinas Luar","Izin Lain"]
      if(!izinList.includes(d.status)) show = false
    }

    if(filter === "all") show = true

    if(!show) return

    table.innerHTML += `
    <tr>
      <td>${d.nama}</td>
      <td>${d.pangkat}</td>
      <td>${d.kompi}</td>
      <td>${d.nrp}</td>
      <td>${d.status}</td>
      <td>${d.jam}</td>
      <td>${d.keterangan}</td>
      <td>${role==="admin" ? `<button onclick="hapusData(${i})">Hapus</button>` : "-"}</td>
    </tr>
    `
  })

  document.getElementById("hadir").innerText = hadir
  document.getElementById("telat").innerText = telat
  document.getElementById("izinTotal").innerText = izin
  document.getElementById("total").innerText = data.length
}

/* HAPUS */
function hapusData(i){
  data.splice(i,1)
  save()
}

/* DOWNLOAD */
function download(){

if(role !== "admin"){
  notify("Hanya admin yang bisa download PDF","error")
  return
}

if(data.length === 0){
  notify("Data kosong","error")
  return
}

const { jsPDF } = window.jspdf
const doc = new jsPDF()

// Judul
doc.setFontSize(14)
doc.text("LAPORAN ABSENSI PRAJURIT", 14, 15)

// Header tabel
const tableColumn = [
  "Nama","Pangkat","Kompi","NRP","Status","Jam","Keterangan"
]

// Data isi tabel
const tableRows = []

data.forEach(d => {
  tableRows.push([
    d.nama,
    d.pangkat,
    d.kompi,
    d.nrp,
    d.status,
    d.jam,
    d.keterangan
  ])
})
const now = new Date()
const tanggal = now.toLocaleDateString("id-ID")

doc.setFontSize(10)
doc.text("Tanggal: " + tanggal, 14, 10)
// Generate tabel
doc.autoTable({
  head: [tableColumn],
  body: tableRows,
  startY: 20,
  styles: {
    fontSize: 8,
    halign: "center"
  },
  headStyles: {
    fillColor: [85, 107, 47] // warna hijau army
  }
})

// Download file
doc.save(`laporan_absensi_${tanggal}.pdf`)

notify("PDF berhasil di-download")
}

/* NOTIFIKASI */
function notify(msg,type="success"){
  const notif = document.getElementById("notif")

  notif.innerText = msg
  notif.className = "notification show " + type

  setTimeout(()=>{
    notif.className = "notification"
  },3000)
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>


</body>
</html>
